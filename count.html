<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일월십사일 방문자 통계</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
body { 
    font-family: 'Noto Sans KR', sans-serif; 
    background-color: #efe6d5; 
    color: #173324; 
    margin: 0; 
    padding: 20px; 
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.dashboard { 
    width: 100%;
    max-width: 600px; 
    background: #f7f4ec; 
    padding: 40px 30px; 
    border-radius: 24px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
}
h1 { 
    font-family: 'Gowun Batang', serif;
    text-align: center; 
    margin-bottom: 20px; 
    font-size: 1.8rem;
}
.refresh-btn {
    display: block;
    margin: 0 auto 30px auto;
    padding: 10px 24px;
    background: #173324;
    color: #f7f4ec;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}
.refresh-btn:hover { background: #265239; }
.grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 16px; 
}
.grid .full-width {
    grid-column: 1 / -1;
}
.card { 
    background: #173324; 
    color: #f6f2ea; 
    padding: 24px 20px; 
    border-radius: 16px; 
    text-align: center; 
}
.card h3 { 
    margin: 0 0 8px 0; 
    font-size: 0.95rem; 
    opacity: 0.8;
    font-weight: 400;
}
.card .value { 
    font-size: 2rem; 
    font-weight: 700; 
}
.loading { 
    text-align: center; 
    padding: 30px; 
    font-weight: 700; 
    opacity: 0.6; 
}
</style>
</head>
<body>

<div class="dashboard">
    <h1>일월십사일 방문자 통계 📊</h1>
    <button class="refresh-btn" onclick="location.reload()">데이터 새로고침 🔄</button>
    <div id="loading" class="loading">데이터를 불러오는 중입니다...</div>
    
    <div id="stats" class="grid" style="display: none;">
        <div class="card full-width">
            <h3>누적 방문자 (Total)</h3>
            <div id="stat-total" class="value">0</div>
        </div>
        <div class="card">
            <h3>오늘 (Day)</h3>
            <div id="stat-day" class="value">0</div>
        </div>
        <div class="card">
            <h3>이번 주 (Week)</h3>
            <div id="stat-week" class="value">0</div>
        </div>
        <div class="card">
            <h3>이번 달 (Month)</h3>
            <div id="stat-month" class="value">0</div>
        </div>
        <div class="card">
            <h3>올해 (Year)</h3>
            <div id="stat-year" class="value">0</div>
        </div>
    </div>
</div>
<script type="module" src="js/counter.js"></script>

</body>
</html>
